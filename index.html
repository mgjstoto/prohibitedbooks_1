<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		body,h1,h2,h3,p{margin:0; padding: 0}
		.img-wrap{position: relative;}
		.img-wrap .uni{width: 100%; display: block;}
		.img-wrap .book{width: 80%; position: absolute;  display: block; top: 5%; left: 11%}

		#popup0 { width: 50%; top: 19%; left: 25%; transform: translateY(-150%)}  
		#popup1 { width: 60%; top: 10%; left: 21%; transform: translateY(-150%)} 
		#popup2 { width: 40%; top: 71%; left: 33.4%; transform: translateY(-900%);}  
		#popup3 { width: 60%; top: 10%; left: 21%; transform: translateY(-150%); }  


		#popup4 { width: 3%; top: 47.5%; left: 35.4%; transform: translateY(-1100%); }  
		#popup5  { width: 3%; top: 47.5%; left: 43.9%;   transform: translateY(-1100%); }
		#popup6  { width: 3%; top: 47.5%; left: 53.9%;   transform: translateY(-1100%); }
		#popup7  { width: 3%; top: 47.5%; left: 62.8%;   transform: translateY(-1100%); }
		#popup8  { width: 40%; top: 71%; left: 33.4%;   transform: translateY(-1100%); }

			
		.img-wrap .popup{         
			position: fixed;     
			transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
			z-index: 100;
		}

		
		.img-wrap .popup.show{
			transform: translateY(0) !important;
		}

		
		.img-wrap .popup.hide{
			transform: translateY(-1500%) !important;
			transition: transform 0.45s cubic-bezier(0.55, 0, 1, 0.45);
		}

	</style>
	<title></title>
</head>
<body>
<section>
	<div class="img-wrap">
		<img src="img1.png" class="uni">
		<img src="img2.png" class="book">
		<img src="img3.png" class="popup" id="popup0">
		<img src="img4.png" class="popup" id="popup1">
		<img src="img5.png" class="popup" id="popup2">
		<img src="img6.png"  class="popup" id="popup3">
		<img src="img8.png"  class="popup" id="popup4">
		<img src="img9.png"  class="popup" id="popup5">
		<img src="img10.png" class="popup" id="popup6">
		<img src="img11.png" class="popup" id="popup7">
		<img src="img7.png"  class="popup" id="popup8"> 



	</div>
</section>
<script>
	const popups = [
		document.getElementById('popup0'),  
		document.getElementById('popup1'),  
		document.getElementById('popup2'),  
		document.getElementById('popup3'),  
		document.getElementById('popup4'), 
		document.getElementById('popup5'),  
		document.getElementById('popup6'),  
		document.getElementById('popup7'),  
		document.getElementById('popup8'),  
	];

	let current = 0;
	let isOpen = false;
	let isDone = false;
	let isDone2 = false;
	let isDone3 = false; 

	window.addEventListener('load', () => {
		setTimeout(() => {
			popups[0].classList.add('show');
			isOpen = true;
		}, 500);
	});

	document.body.addEventListener('click', () => {
		if (isDone3) return;
		if (!isOpen) return;

		if (current === 0) {
			popups[0].classList.remove('show');
			popups[0].classList.add('hide');
			isOpen = false;
			setTimeout(() => {
				popups[1].classList.add('show');
				current = 1;
				isOpen = true;
			}, 500);

		} else if (current === 1) {
			popups[2].classList.add('show');
			current = 2;
			isDone = true;

		} else if (current === 4) {
			// 
			popups[8].classList.add('show');
			current = 5;
			isDone3 = true;
		}
	});

popups[1].addEventListener('click', (e) => {
    if (!isDone) return;
    e.stopPropagation();
    popups[1].classList.remove('show');
    popups[1].classList.add('hide');
    popups[2].classList.remove('show');
    popups[2].classList.add('hide');
    setTimeout(() => {
        // 
        popups[3].classList.add('show');
        popups[4].classList.add('show');
        popups[5].classList.add('show');
        popups[6].classList.add('show');
        popups[7].classList.add('show');
        current = 4;
        isDone2 = true;
        isOpen = true;
    }, 500);
});

popups[4].addEventListener('click', (e) => {
    e.stopPropagation();
    window.location.href = 'hhttps://mgjstoto.github.io/prohibitedbooks_2/'; 
});
</script>
</body>
</html>
